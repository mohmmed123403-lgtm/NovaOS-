<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovawinX</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background-color: #0f1113;
            border: 2px solid #0078d4;
            border-radius: 25px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 120, 212, 0.3);
        }
        h1 {
            color: #00f2ff;
            font-size: 50px;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            letter-spacing: 2px;
        }
        .author {
            color: #ffcc00;
            font-size: 1.2rem;
            margin: 10px 0 30px 0;
            font-weight: bold;
        }
        .welcome {
            font-size: 1rem;
            color: #ccc;
            line-height: 1.6;
        }
        .slogan {
            font-size: 1.1rem;
            margin: 20px 0;
            color: #fff;
        }
        .info-box {
            border: 1px dashed #333;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            background-color: #161a1d;
        }
        .info-box h3 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
        }
        .features {
            font-size: 0.9rem;
            color: #00ffaa;
        }
        .download-btn {
            background: linear-gradient(to right, #0082e6, #00d4ff);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0, 130, 230, 0.4);
            transition: 0.3s;
        }
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>NOVAOS</h1>
    <p class="author">بصمة المطور العبقري: محمد</p>
    
    <p class="welcome">مرحباً بكم في الموقع الرسمي لشركة<br><strong>NovaOS Corporation</strong></p>
    
    <p class="slogan">نحن لا نعدل الأنظمة.. نحن نعيد ابتكارها.</p>
    
    <div class="info-box">
        <h3>Win11 Turbo</h3>
        <p class="features">✓ خفيفة جداً ✓ بدون TPM ✓ دعم MBR/GPT</p>
    </div>
    
    <a href="win11_turbo_edition.iso" download class="download-btn">
        تحميل النظام (نسخة الامتياز) 🚀
    </a>
</div>

</body>
</html>
