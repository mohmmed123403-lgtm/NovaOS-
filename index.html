        * {

        .logo {

            height: 80px;

            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        
        h1 {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
